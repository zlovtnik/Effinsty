name: Effinsty API CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test:ci

      - name: Build
        run: bun run build

      - name: Bundle budgets
        run: bun run perf:budgets

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: E2E
        run: bun run test:e2e

  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Effinsty.Api.sln

      - name: Build
        run: dotnet build Effinsty.Api.sln --configuration Release --no-restore

      - name: Install Fantomas
        run: dotnet tool install fantomas-tool --tool-path ./.tools

      - name: Format check
        run: ./.tools/fantomas --check .

      - name: Install FSharpLint
        run: dotnet tool install dotnet-fsharplint --tool-path ./.tools

      - name: Lint
        run: ./.tools/dotnet-fsharplint lint src/**/*.fsproj tests/**/*.fsproj

      - name: Unit and integration tests
        run: dotnet test Effinsty.Api.sln --configuration Release --no-build --verbosity normal

      - name: Vulnerability scan
        run: dotnet list Effinsty.Api.sln package --vulnerable --include-transitive

      - name: Build container
        run: docker build -t effinsty-api:${{ github.sha }} .

      - name: Render Kubernetes manifest with image tag
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          sed "s|\${IMAGE_TAG}|${IMAGE_TAG}|g" k8s/deployment.yaml > /tmp/effinsty-deployment.yaml
          grep -q "ghcr.io/zlovtnik/effinsty-api:${IMAGE_TAG}" /tmp/effinsty-deployment.yaml
