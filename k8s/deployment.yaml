apiVersion: apps/v1
kind: Deployment
metadata:
  name: effinsty-api
  namespace: effinsty
spec:
  replicas: 3
  selector:
    matchLabels:
      app: effinsty-api
  template:
    metadata:
      labels:
        app: effinsty-api
    spec:
      containers:
      - name: api
        image: ghcr.io/zlovtnik/effinsty-api:${IMAGE_TAG}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: Production
        - name: TNS_ADMIN
          value: /oracle/wallet
        - name: ORACLE_WALLET_LOCATION
          value: /oracle/wallet
        readinessProbe:
          httpGet:
            path: /api/health/oracle
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health/live
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 20
        volumeMounts:
        - name: oracle-wallet
          mountPath: /oracle/wallet
          readOnly: true
      volumes:
      - name: oracle-wallet
        secret:
          secretName: oracle-wallet
---
apiVersion: v1
kind: Service
metadata:
  name: effinsty-api
  namespace: effinsty
spec:
  selector:
    app: effinsty-api
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
